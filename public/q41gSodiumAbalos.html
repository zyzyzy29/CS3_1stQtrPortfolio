<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Portfolio</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background-color: #380000; }
        .container { background: rgb(246, 245, 245); padding: 20px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        .stars { font-size: 25px; cursor: pointer; color: #ccc; }
        .stars .yellow { color: #ffcc00; }
        
        button { width: 100%; padding: 10px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        .movie-list { margin-top: 20px; text-align: left; }
        .movie-item { background: #fffdf0; border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
        .list-stars { color: #ffcc00; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add a Movie!!!!</h2>
    
    <div class="form-group">
        <label>Title:</label>
        <input type="text" id="movieTitle">
    </div>
    
    <div class="form-group">
        <label>Year:</label>
        <input type="text" id="movieYear">
    </div>
    
    <div class="form-group">
        <label>Genre:</label>
        <select id="movieGenre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Romantinc Comedy">Romantic Comedy</option>
            <option value="Horror">Horror</option>
            <option value="Thriller">Thriller</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Rating:</label>
        <div class="stars" id="starRating">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>
    </div>

    <button id="addMovieBtn">Add Movie</button>

    <hr>
    <h3>Movie List</h3>
    <div id="movieListDisplay" class="movie-list"></div>
</div>

<script>
    let currentRating = 0;
    const stars = document.querySelectorAll('#starRating span');

    stars.forEach(star => {
        star.onclick = function() {
            currentRating = this.getAttribute('data-value');
            updateStars(currentRating);
        }
    });

    function updateStars(rating) {
        stars.forEach(s => {
            s.classList.toggle('yellow', s.getAttribute('data-value') <= rating);
        });
    }

 
    document.getElementById('addMovieBtn').onclick = function() {
        const title = document.getElementById('movieTitle').value;
        const year = document.getElementById('movieYear').value;
        const genre = document.getElementById('movieGenre').value;

        if(!title || !year || currentRating === 0) return alert("Please fill all fields");

        const newMovie = { title, year, genre, rating: currentRating };

  
        const movies = JSON.parse(localStorage.getItem('movies') || "[]");
        movies.push(newMovie);
        
      
        localStorage.setItem('movies', JSON.stringify(movies));

   
        document.getElementById('movieTitle').value = '';
        document.getElementById('movieYear').value = '';
        currentRating = 0;
        updateStars(0);
        displayMovies();
    };

   
    function displayMovies() {
        const listDiv = document.getElementById('movieListDisplay');
        const movies = JSON.parse(localStorage.getItem('movies') || "[]");
        
        listDiv.innerHTML = movies.map(m => `
            <div class="movie-item">
                <span>${m.title} (${m.year}) - ${m.genre}, Rating: </span>
                <span class="list-stars">${'★'.repeat(m.rating)}${'☆'.repeat(5-m.rating)}</span>
            </div>
        `).join('');
    }

    displayMovies();
</script>

</body>
</html>
